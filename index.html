<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>IRPC Project Tracking Dashboard</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f9; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
    
    /* Header & Logo */
    .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
    .logo-irpc { height: 50px; width: auto; }
    .title-group h1 { color: #004a99; margin: 0; font-size: 28px; }
    .title-group p { margin: 5px 0 0; color: #666; font-size: 14px; }

    /* Summary Cards */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: #fff; padding: 20px; border-radius: 10px; border-left: 5px solid #004a99; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
    .card h3 { margin: 0; font-size: 14px; color: #888; text-transform: uppercase; }
    .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; }
    .unit { font-size: 14px; font-weight: normal; margin-left: 5px; color: #666; }

    /* Input Zone */
    .input-group { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; padding: 20px; background: #fdfdfd; border: 1px solid #e0e0e0; border-radius: 10px; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: bold; color: #555; }
    input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
    #project { width: 300px; }
    
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-save { background: #004a99; color: white; }
    .btn-save:hover { background: #003366; }
    .btn-export { background: #28a745; color: white; margin-bottom: 15px; }
    
    /* Table Zone */
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    th { background-color: #f8f9fa; color: #555; font-size: 13px; }
    .status-badge { padding: 4px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; }
    .il0 { background: #e9ecef; color: #495057; }
    .il3 { background: #fff3cd; color: #856404; }
    .il5 { background: #d4edda; color: #155724; }
    .edit-btn { background: #ffc107; margin-right: 5px; }
    .del-btn { background: #dc3545; color: #fff; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-flex">
    <div class="title-group">
      <h1>📊 Project IL Tracking</h1>
      <p>Cost Saving Monitoring System | IRPC Engineering Internship</p>
    </div>
    <img src="https://www.irpc.co.th/wp-content/uploads/2020/05/logo-irpc.png" alt="IRPC Logo" class="logo-irpc">
  </div>

  <div class="summary-grid">
    <div class="card" style="border-left-color: #004a99;"><h3>โครงการทั้งหมด</h3><p id="totalProjects">0</p></div>
    <div class="card" style="border-left-color: #ffc107;"><h3>สถานะ IL3</h3><p id="ongoingProjects">0</p></div>
    <div class="card" style="border-left-color: #28a745;"><h3>สถานะ IL5</h3><p id="successProjects">0</p></div>
    <div class="card" style="border-left-color: #00c2cb;"><h3>ยอดประหยัดรวม</h3><p><span id="totalSaving">0</span> <span class="unit">บาท</span></p></div>
  </div>
  
  <div class="input-group">
    <input type="hidden" id="currentDocId"> 
    <div class="field"><label>ชื่อโครงการ *</label><input type="text" id="project" placeholder="ระบุชื่อโครงการ"></div>
    <div class="field"><label>ผู้รับผิดชอบ</label><input type="text" id="owner" placeholder="ระบุชื่อ"></div>
    <div class="field">
      <label>สถานะ</label>
      <select id="stage">
        <option value="IL0">IL0</option>
        <option value="IL3">IL3</option>
        <option value="IL5">IL5</option>
      </select>
    </div>
    <div class="field"><label>ยอดประหยัด (บาท)</label><input type="number" id="saving" placeholder="0"></div>
    <div class="field"><label>Deadline</label><input type="date" id="deadline"></div>
    <button class="btn-save" id="btnSave" onclick="saveData()">บันทึก</button>
    <button onclick="resetForm()" style="background:#6c757d; color:white;">ล้าง</button>
  </div>

  <button class="btn-export" onclick="exportToCSV()">📥 Export Excel (.csv)</button>

  <table>
    <thead>
      <tr>
        <th>ชื่อโครงการ</th><th>ผู้รับผิดชอบ</th><th>สถานะ</th><th>ยอดประหยัด</th><th>Deadline</th><th>จัดการ</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBUDRGCT-l-2_A2yS4yAZo-vw00yvNPY8k",
    authDomain: "costsavingtracking.firebaseapp.com",
    projectId: "costsavingtracking",
    storageBucket: "costsavingtracking.firebasestorage.app",
    messagingSenderId: "813825582028",
    appId: "1:813825582028:web:09266d80d472f8333d7369"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveData = async function() {
    const projName = document.getElementById("project").value.trim();
    if (!projName) return alert("กรุณาระบุชื่อโครงการครับ");

    const payload = {
      project: projName,
      owner: document.getElementById("owner").value.trim() || "-",
      stage: document.getElementById("stage").value,
      saving: Number(document.getElementById("saving").value) || 0,
      deadline: document.getElementById("deadline").value || "-",
      time: new Date()
    };

    try {
      const id = document.getElementById("currentDocId").value;
      if (id) {
        await updateDoc(doc(db, "projects", id), payload);
      } else {
        await addDoc(collection(db, "projects"), payload);
      }
      resetForm(); loadProjects();
    } catch (e) { alert("เกิดข้อผิดพลาด: " + e.message); }
  }

  window.editProject = (id, p, o, s, v, d) => {
    document.getElementById("currentDocId").value = id;
    document.getElementById("project").value = p;
    document.getElementById("owner").value = (o === "-") ? "" : o;
    document.getElementById("stage").value = s;
    document.getElementById("saving").value = v;
    document.getElementById("deadline").value = (d === "-") ? "" : d;
    document.getElementById("btnSave").innerText = "อัปเดต";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.deleteProject = async (id) => {
    if (confirm("ลบโครงการนี้?")) {
      await deleteDoc(doc(db, "projects", id));
      loadProjects();
    }
  }

  window.resetForm = () => {
    document.getElementById("currentDocId").value = "";
    document.getElementById("project").value = "";
    document.getElementById("owner").value = "";
    document.getElementById("saving").value = "";
    document.getElementById("deadline").value = "";
    document.getElementById("stage").selectedIndex = 0;
    document.getElementById("btnSave").innerText = "บันทึก";
  }

  async function loadProjects() {
    const q = query(collection(db, "projects"), orderBy("time", "desc"));
    const snap = await getDocs(q);
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    let stats = { t:0, o:0, s:0, money:0 };
    let csv = "Project,Owner,Stage,Saving,Deadline\n";

    snap.forEach((dDoc) => {
      const d = dDoc.data();
      stats.t++;
      if(d.stage === "IL3") stats.o++;
      if(d.stage === "IL5") stats.s++;
      stats.money += d.saving;
      csv += `${d.project},${d.owner},${d.stage},${d.saving},${d.deadline}\n`;

      tbody.innerHTML += `<tr>
        <td><strong>${d.project}</strong></td>
        <td>${d.owner}</td>
        <td><span class="status-badge ${d.stage.toLowerCase()}">${d.stage}</span></td>
        <td>${d.saving.toLocaleString()} บาท</td>
        <td>${d.deadline}</td>
        <td>
          <button class="edit-btn" onclick="editProject('${dDoc.id}','${d.project}','${d.owner}','${d.stage}',${d.saving},'${d.deadline}')">แก้</button>
          <button class="del-btn" onclick="deleteProject('${dDoc.id}')">ลบ</button>
        </td>
      </tr>`;
    });
    document.getElementById("totalProjects").innerText = stats.t;
    document.getElementById("ongoingProjects").innerText = stats.o;
    document.getElementById("successProjects").innerText = stats.s;
    document.getElementById("totalSaving").innerText = stats.money.toLocaleString();
    window.currentCsv = csv;
  }

  window.exportToCSV = () => {
    const blob = new Blob(["\ufeff" + window.currentCsv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "IRPC_Project_Report.csv";
    link.click();
  }

  loadProjects();
</script>
</body>
</html>
