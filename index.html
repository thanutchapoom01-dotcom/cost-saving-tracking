<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Project Tracking</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f9; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    h1 { color: #004a99; text-align: center; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: #fff; padding: 20px; border-radius: 10px; border-left: 5px solid #004a99; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
    .card h3 { margin: 0; font-size: 14px; color: #888; }
    .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; }
    .input-group { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; padding: 20px; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-save { background: #004a99; color: white; }
    .btn-export { background: #28a745; color: white; margin-bottom: 15px; }
    .status-badge { padding: 4px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; }
    .il0 { background: #e9ecef; } .il3 { background: #fff3cd; } .il5 { background: #d4edda; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>

<div class="container">
  <h1>📊 Project IL Tracking</h1>

  <div class="summary-grid">
    <div class="card"><h3>ทั้งหมด</h3><p id="totalProjects">0</p></div>
    <div class="card"><h3>IL3</h3><p id="ongoingProjects">0</p></div>
    <div class="card"><h3>IL5</h3><p id="successProjects">0</p></div>
    <div class="card"><h3>เลยกำหนด</h3><p id="overdueProjects">0</p></div>
  </div>
  
  <div class="input-group">
    <input type="hidden" id="currentDocId"> 
    <div class="field"><label>ชื่อโครงการ *</label><input type="text" id="project"></div>
    <div class="field"><label>ผู้รับผิดชอบ</label><input type="text" id="owner"></div>
    <div class="field">
      <label>สถานะ</label>
      <select id="stage">
        <option value="IL0">IL0</option>
        <option value="IL3">IL3</option>
        <option value="IL5">IL5</option>
      </select>
    </div>
    <div class="field"><label>ยอดประหยัด (฿)</label><input type="number" id="saving"></div>
    <div class="field"><label>Deadline</label><input type="date" id="deadline"></div>
    <button class="btn-save" onclick="saveData()">บันทึก</button>
    <button onclick="resetForm()">ล้าง</button>
  </div>

  <button class="btn-export" onclick="exportToCSV()">📥 Export Excel</button>

  <table>
    <thead>
      <tr>
        <th>ชื่อโครงการ</th><th>ผู้รับผิดชอบ</th><th>สถานะ</th><th>ยอดประหยัด</th><th>Deadline</th><th>จัดการ</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ตรวจสอบตัวแปร Firebase ตรงนี้ว่าก๊อปมาครบไหม
  const firebaseConfig = {
    apiKey: "AIzaSyBUDRGCT-l-2_A2yS4yAZo-vw00yvNPY8k",
    authDomain: "costsavingtracking.firebaseapp.com",
    projectId: "costsavingtracking",
    storageBucket: "costsavingtracking.firebasestorage.app",
    messagingSenderId: "813825582028",
    appId: "1:813825582028:web:09266d80d472f8333d7369"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveData = async function() {
    const proj = document.getElementById("project").value.trim();
    if (!proj) return alert("กรุณาใส่ชื่อโครงการ");

    const payload = {
      project: proj,
      owner: document.getElementById("owner").value || "-",
      stage: document.getElementById("stage").value,
      saving: Number(document.getElementById("saving").value) || 0,
      deadline: document.getElementById("deadline").value || "-",
      time: new Date()
    };

    try {
      const id = document.getElementById("currentDocId").value;
      if (id) {
        await updateDoc(doc(db, "projects", id), payload);
      } else {
        await addDoc(collection(db, "projects"), payload);
      }
      resetForm();
      loadProjects();
    } catch (err) {
      alert("บันทึกไม่สำเร็จ: " + err.message);
    }
  }

  window.resetForm = () => {
    document.getElementById("currentDocId").value = "";
    document.getElementById("project").value = "";
    document.getElementById("owner").value = "";
    document.getElementById("saving").value = "";
    document.getElementById("deadline").value = "";
    document.getElementById("stage").selectedIndex = 0;
  }

  window.editProject = (id, p, o, s, v, d) => {
    document.getElementById("currentDocId").value = id;
    document.getElementById("project").value = p;
    document.getElementById("owner").value = o === "-" ? "" : o;
    document.getElementById("stage").value = s;
    document.getElementById("saving").value = v;
    document.getElementById("deadline").value = d === "-" ? "" : d;
    window.scrollTo(0,0);
  }

  window.deleteProject = async (id) => {
    if (confirm("ลบโครงการนี้?")) {
      await deleteDoc(doc(db, "projects", id));
      loadProjects();
    }
  }

  async function loadProjects() {
    const q = query(collection(db, "projects"), orderBy("time", "desc"));
    const snap = await getDocs(q);
    const tbody = document.getElementById("tableBody");
    const today = new Date().toISOString().split('T')[0];
    tbody.innerHTML = "";
    let stats = { t:0, o:0, s:0, d:0 };
    let csv = "Project,Owner,Stage,Saving,Deadline\n";

    snap.forEach((dDoc) => {
      const d = dDoc.data();
      stats.t++;
      if(d.stage === "IL3") stats.o++;
      if(d.stage === "IL5") stats.s++;
      const isOver = (d.deadline !== "-" && d.deadline < today && d.stage !== "IL5");
      if(isOver) stats.d++;
      csv += `${d.project},${d.owner},${d.stage},${d.saving},${d.deadline}\n`;

      tbody.innerHTML += `<tr>
        <td>${d.project}</td><td>${d.owner}</td>
        <td><span class="status-badge ${d.stage.toLowerCase()}">${d.stage}</span></td>
        <td>${d.saving.toLocaleString()}</td><td>${d.deadline}</td>
        <td>
          <button style="background:#ffc107" onclick="editProject('${dDoc.id}','${d.project}','${d.owner}','${d.stage}',${d.saving},'${d.deadline}')">แก้</button>
          <button style="background:#dc3545;color:white" onclick="deleteProject('${dDoc.id}')">ลบ</button>
        </td>
      </tr>`;
    });
    document.getElementById("totalProjects").innerText = stats.t;
    document.getElementById("ongoingProjects").innerText = stats.o;
    document.getElementById("successProjects").innerText = stats.s;
    document.getElementById("overdueProjects").innerText = stats.d;
    window.currentCsv = csv;
  }

  window.exportToCSV = () => {
    const blob = new Blob(["\ufeff" + window.currentCsv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Report.csv";
    link.click();
  }

  loadProjects();
</script>
</body>
</html>
