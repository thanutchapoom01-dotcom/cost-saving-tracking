<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRPC Project Tracking Dashboard</title>
  <style>
    :root {
      --primary: #004a99;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #ffc107;
      --gray: #6c757d;
      --light: #f4f7f9;
    }

    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: var(--light); color: #333; }
    .container { max-width: 1300px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; }
    
    .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
    .title-group h1 { color: var(--primary); margin: 0; font-size: 28px; }

    /* Toast Notification */
    #toast {
      visibility: hidden; min-width: 280px; color: #fff; text-align: center;
      border-radius: 12px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
      transform: translateX(-50%); font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    #toast.show { visibility: visible; animation: fadein 0.4s, fadeout 0.4s 2.6s; }

    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

    /* Summary Cards */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: #fff; padding: 20px; border-radius: 12px; border-top: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.02); text-align: center; transition: 0.2s; }
    .card:hover { transform: translateY(-3px); }
    .card h3 { margin: 0; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .card p { margin: 12px 0 0; font-size: 26px; font-weight: 800; color: #222; }

    /* Input Zone */
    .input-group { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; padding: 25px; background: #fafafa; border: 1px solid #eaeaea; border-radius: 12px; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 13px; font-weight: 600; color: #444; }
    input, select { padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; transition: 0.3s; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,74,153,0.1); }
    
    button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-save { background: var(--primary); color: white; }
    .btn-save:hover { background: #003366; }
    .btn-export { background: var(--success); color: white; margin-bottom: 20px; }
    
    /* Table Styling */
    .table-container { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th { background-color: #f8f9fa; color: #666; font-size: 13px; font-weight: 600; padding: 18px 15px; text-transform: uppercase; border-bottom: 2px solid #eee; text-align: left; }
    td { padding: 16px 15px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
    tr:hover { background-color: #fcfdfe; }
    
    .status-badge { padding: 6px 14px; border-radius: 50px; font-size: 11px; font-weight: 700; display: inline-block; text-align: center; min-width: 60px; }
    .il0 { background: #f0f2f5; color: #64748b; }
    .il3 { background: #fffbeb; color: #b45309; }
    .il5 { background: #f0fdf4; color: #15803d; }

    .btn-action { padding: 8px 12px; font-size: 12px; }
    .btn-edit { background: var(--warning); color: #000; margin-right: 5px; }
    .btn-delete { background: var(--danger); color: white; }
  </style>
</head>
<body>

<div id="toast">บันทึกสำเร็จ!</div>

<div class="container">
  <div class="header-flex">
    <div class="title-group">
      <h1>📊 Project IL Tracking</h1>
    </div>
  </div>

  <div class="summary-grid">
    <div class="card"><h3>Total Projects</h3><p id="totalProjects">0</p></div>
    <div class="card" style="border-top-color: #adb5bd;"><h3>IL0 Status</h3><p id="il0Count">0</p></div>
    <div class="card" style="border-top-color: var(--warning);"><h3>IL3 Status</h3><p id="il3Count">0</p></div>
    <div class="card" style="border-top-color: var(--success);"><h3>IL5 Status</h3><p id="il5Count">0</p></div>
    <div class="card" style="border-top-color: #00c2cb;"><h3>Total Saving</h3><p><span id="totalSaving">0</span> <span style="font-size:14px; font-weight:400;">THB</span></p></div>
  </div>
  
  <div class="input-group">
    <input type="hidden" id="currentDocId"> 
    <div class="field"><label>Project Name *</label><input type="text" id="project" placeholder="ชื่อโครงการ" style="width:300px;"></div>
    <div class="field"><label>Owner</label><input type="text" id="owner" placeholder="ผู้รับผิดชอบ" style="width:150px;"></div>
    <div class="field">
      <label>Stage</label>
      <select id="stage">
        <option value="IL0">IL0</option>
        <option value="IL3">IL3</option>
        <option value="IL5">IL5</option>
      </select>
    </div>
    <div class="field"><label>Saving (THB)</label><input type="number" id="saving" placeholder="0"></div>
    <div class="field"><label>Deadline</label><input type="date" id="deadline"></div>
    <button class="btn-save" id="btnSave" onclick="saveData()">💾 บันทึกข้อมูล</button>
    <button onclick="resetForm()" style="background:var(--gray); color:white;">ล้าง</button>
  </div>

  <button class="btn-export" onclick="exportToCSV()">📥 Export to Excel (.csv)</button>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Project Description</th>
          <th style="width:150px;">Responsible</th>
          <th style="width:120px;">Status</th>
          <th style="width:180px;">Saving (THB)</th>
          <th style="width:130px;">Deadline</th>
          <th style="width:140px;">Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, getDocs, query, orderBy, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBUDRGCT-l-2_A2yS4yAZo-vw00yvNPY8k",
    authDomain: "costsavingtracking.firebaseapp.com",
    projectId: "costsavingtracking",
    storageBucket: "costsavingtracking.firebasestorage.app",
    messagingSenderId: "813825582028",
    appId: "1:813825582028:web:09266d80d472f8333d7369"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function showToast(msg, bgColor = "#28a745") {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.backgroundColor = bgColor;
    t.className = "show";
    setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
  }

  window.saveData = async function() {
    const projName = document.getElementById("project").value.trim();
    if (!projName) return showToast("กรุณาระบุชื่อโครงการ", "#dc3545");
    
    const payload = {
      project: projName,
      owner: document.getElementById("owner").value.trim() || "-",
      stage: document.getElementById("stage").value,
      saving: Number(document.getElementById("saving").value) || 0,
      deadline: document.getElementById("deadline").value || "-",
      time: new Date()
    };

    try {
      const id = document.getElementById("currentDocId").value;
      if (id) { 
        await updateDoc(doc(db, "projects", id), payload); 
        showToast("อัปเดตโครงการสำเร็จ!");
      } else { 
        await addDoc(collection(db, "projects"), payload); 
        showToast("เพิ่มโครงการใหม่สำเร็จ!");
      }
      resetForm();
    } catch (e) { showToast("Error: " + e.message, "#dc3545"); }
  }

  window.deleteProject = async (id) => {
    if (confirm("ต้องการลบโครงการนี้ใช่หรือไม่?")) { 
      await deleteDoc(doc(db, "projects", id)); 
      showToast("ลบข้อมูลโครงการแล้ว", "#dc3545");
    }
  }

  window.editProject = (id, p, o, s, v, d) => {
    document.getElementById("currentDocId").value = id;
    document.getElementById("project").value = p;
    document.getElementById("owner").value = (o === "-") ? "" : o;
    document.getElementById("stage").value = s;
    document.getElementById("saving").value = v;
    document.getElementById("deadline").value = (d === "-") ? "" : d;
    document.getElementById("btnSave").innerText = "🔄 อัปเดตข้อมูล";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.resetForm = () => {
    document.getElementById("currentDocId").value = "";
    document.getElementById("project").value = "";
    document.getElementById("owner").value = "";
    document.getElementById("saving").value = "";
    document.getElementById("deadline").value = "";
    document.getElementById("stage").selectedIndex = 0;
    document.getElementById("btnSave").innerText = "💾 บันทึกข้อมูล";
  }

  function listenToProjects() {
    const q = query(collection(db, "projects"), orderBy("time", "desc"));
    onSnapshot(q, (snap) => {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";
      
      let stats = { t:0, il0:0, il3:0, il5:0, money:0 };
      let csv = "\uFEFFProject,Owner,Stage,Saving,Deadline\n";

      snap.forEach((dDoc) => {
        const d = dDoc.data();
        stats.t++;
        if(d.stage === "IL0") stats.il0++;
        if(d.stage === "IL3") stats.il3++;
        if(d.stage === "IL5") stats.il5++;
        stats.money += d.saving;
        csv += `"${d.project}","${d.owner}","${d.stage}","${d.saving}","${d.deadline}"\n`;

        tbody.innerHTML += `<tr>
          <td><div style="font-weight:600; color:#1a1a1a;">${d.project}</div></td>
          <td>${d.owner}</td>
          <td><span class="status-badge ${d.stage.toLowerCase()}">${d.stage}</span></td>
          <td style="font-weight:600;">
            ${d.saving.toLocaleString()} 
            <span style="font-weight:400; color:#999; font-size:12px; margin-left:4px;">บาท</span>
          </td>
          <td>${d.deadline}</td>
          <td>
            <button class="btn-action btn-edit" onclick="editProject('${dDoc.id}','${d.project}','${d.owner}','${d.stage}',${d.saving},'${d.deadline}')">แก้</button>
            <button class="btn-action btn-delete" onclick="deleteProject('${dDoc.id}')">ลบ</button>
          </td>
        </tr>`;
      });
      document.getElementById("totalProjects").innerText = stats.t;
      document.getElementById("il0Count").innerText = stats.il0;
      document.getElementById("il3Count").innerText = stats.il3;
      document.getElementById("il5Count").innerText = stats.il5;
      document.getElementById("totalSaving").innerText = stats.money.toLocaleString();
      window.currentCsv = csv;
    });
  }

  window.exportToCSV = () => {
    if(!window.currentCsv) return;
    const blob = new Blob([window.currentCsv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Project_Report.csv";
    link.click();
  }

  listenToProjects();
</script>
</body>
</html>
